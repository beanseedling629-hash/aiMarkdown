<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #495057;
      --accent: #228be6;
      --border: #e9ecef;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e293b;
        --text: #f1f5f9;
        --text-secondary: #94a3b8;
        --accent: #38bdf8;
        --border: #334155;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Markdown Viewer</h1>
  <p class="subtitle">Open .md files in Chrome with beautiful rendering</p>
  <button class="btn" id="open-folder">Open Folder</button>
  <p class="info">
    Tip: You can also directly open any .md file via <code>file://</code> protocol.
    Make sure to enable "Allow access to file URLs" in extension settings.
  </p>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
